<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate 🎓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/certificate.css">
</head>
<body>
  <div class="cert-app">
    <div class="cert-toolbar no-print">
      <a href="index.html" class="cert-tb-btn">🏠 Home</a>
      <a href="trophy-room.html" class="cert-tb-btn">🏆 Trophy Room</a>
      <button class="cert-tb-btn primary" onclick="Certificate.print()">🖨 Print</button>
    </div>

    <div class="cert-frame" id="cert-frame">
      <div class="cert-corner tl">❋</div>
      <div class="cert-corner tr">❋</div>
      <div class="cert-corner bl">❋</div>
      <div class="cert-corner br">❋</div>

      <div class="cert-brand">ZAVALA · SERRA</div>
      <div class="cert-title">Certificate of Achievement</div>
      <div class="cert-subtitle">Certificado de Logro</div>

      <div class="cert-seal" id="cert-seal">🏆</div>

      <div class="cert-presented">This certifies that</div>
      <div class="cert-name" id="cert-name">Explorer</div>
      <div class="cert-presented">has earned the rank of</div>
      <div class="cert-rank" id="cert-rank">Explorer</div>
      <div class="cert-app" id="cert-app">across the Zavala Serra Apps suite</div>

      <div class="cert-footer">
        <div class="cert-sig">
          <div class="cert-sig-line"></div>
          <div class="cert-sig-label">Parent Signature</div>
        </div>
        <div class="cert-date">
          <div class="cert-date-value" id="cert-date">—</div>
          <div class="cert-sig-label">Date Awarded</div>
        </div>
      </div>

      <div class="cert-motto">“Learn, play, explore — one star at a time.”</div>
    </div>
  </div>

  <script src="js/debug.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/certificate.js"></script>
</body>
</html>
