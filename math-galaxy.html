<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Galaxy 🧮</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       MATH GALAXY — Space-Themed Math Practice
       4 levels: Cadet (PreK) · Explorer (1-2) · Pilot (3-4) · Commander (5-6)
       ================================================================ */

    :root {
      --bg-deep: #070720;
      --bg-surface: #0E0E30;
      --bg-card: #151542;
      --border-subtle: rgba(255,255,255,0.07);

      --blue: #60A5FA;
      --blue-glow: rgba(59, 130, 246, 0.4);
      --cyan: #22D3EE;
      --cyan-glow: rgba(34, 211, 238, 0.35);
      --gold: #FBBF24;
      --gold-glow: rgba(251, 191, 36, 0.4);
      --green: #34D399;
      --green-glow: rgba(52, 211, 153, 0.4);
      --red: #F87171;
      --red-glow: rgba(248, 113, 113, 0.35);
      --purple: #A78BFA;
      --purple-glow: rgba(167, 139, 250, 0.35);
      --pink: #F472B6;

      --text: #F0EDFF;
      --text-muted: #8B86B0;

      --font-display: 'Baloo 2', 'Nunito', cursive;
      --font-body: 'Nunito', system-ui, sans-serif;
      --radius: 20px;
      --radius-sm: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; font-size: 16px; }

    body {
      min-height: 100%;
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- Starfield ---- */
    body::before, body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      background:
        radial-gradient(1.5px 1.5px at 12% 18%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 28% 42%, rgba(255,255,255,0.5), transparent),
        radial-gradient(2px 2px at 50% 8%, rgba(96,165,250,0.8), transparent),
        radial-gradient(1px 1px at 65% 55%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1.5px 1.5px at 78% 22%, rgba(251,191,36,0.7), transparent),
        radial-gradient(1px 1px at 88% 65%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.5px 1.5px at 18% 75%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 38% 85%, rgba(167,139,250,0.5), transparent),
        radial-gradient(2px 2px at 58% 70%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 92% 88%, rgba(34,211,238,0.6), transparent),
        radial-gradient(1.5px 1.5px at 8% 92%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 72% 78%, rgba(255,255,255,0.5), transparent);
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    @keyframes twinkle { 0% { opacity: 0.5; } 100% { opacity: 1; } }

    /* ---- Nebula blobs ---- */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
      z-index: 0;
      animation: drift 25s ease-in-out infinite alternate;
    }
    .nebula-1 { width: 420px; height: 420px; background: rgba(59,130,246,0.12); top: -80px; left: -60px; }
    .nebula-2 { width: 350px; height: 350px; background: rgba(167,139,250,0.1); bottom: 10%; right: -70px; animation-delay: -8s; }
    .nebula-3 { width: 300px; height: 300px; background: rgba(251,191,36,0.08); top: 40%; left: 20%; animation-delay: -15s; }
    @keyframes drift {
      0% { transform: translate(0,0) scale(1); }
      50% { transform: translate(25px,-20px) scale(1.08); }
      100% { transform: translate(-15px,15px) scale(0.96); }
    }

    /* ---- App shell ---- */
    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      padding: 24px 20px 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Home button ---- */
    .home-btn {
      position: absolute;
      top: 24px;
      left: 20px;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1.5px solid var(--border-subtle);
      background: var(--bg-card);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      text-decoration: none;
      transition: all 0.25s ease;
      z-index: 10;
    }
    .home-btn:hover { border-color: var(--blue); color: var(--blue); transform: scale(1.08); }

    /* ---- Screen management ---- */
    .screen { display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    /* ================================================================
       LEVEL SELECT SCREEN
       ================================================================ */
    .level-header {
      text-align: center;
      margin: 40px 0 32px;
      animation: fadeUp 0.6s ease-out both;
    }
    .level-header .icon { font-size: 52px; display: block; margin-bottom: 4px; animation: planetSpin 4s ease-in-out infinite; }
    @keyframes planetSpin {
      0%,100% { transform: rotate(-3deg) scale(1); }
      50% { transform: rotate(3deg) scale(1.08); }
    }
    .level-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--blue), var(--cyan), var(--gold));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 5s ease-in-out infinite;
    }
    @keyframes gradShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .level-header p { color: var(--text-muted); font-weight: 600; margin-top: 6px; font-size: 1rem; }

    .level-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .level-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 24px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      animation: fadeUp 0.5s ease-out both;
    }
    .level-card:nth-child(1) { animation-delay: 0.1s; }
    .level-card:nth-child(2) { animation-delay: 0.2s; }
    .level-card:nth-child(3) { animation-delay: 0.3s; }
    .level-card:nth-child(4) { animation-delay: 0.4s; }

    .level-card:hover {
      transform: translateY(-5px) scale(1.03);
      border-color: var(--card-color);
      box-shadow: 0 12px 40px -10px var(--card-glow);
    }
    .level-card:active { transform: translateY(-2px) scale(1.01); }

    .level-card .rank-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .level-card:hover .rank-icon { transform: scale(1.2) rotate(-5deg); }
    .level-card .rank-name {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--card-color);
    }
    .level-card .rank-ages {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 4px;
    }
    .level-card .rank-topics {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.5;
      opacity: 0.8;
    }

    .card-cadet    { --card-color: var(--cyan);   --card-glow: var(--cyan-glow); }
    .card-explorer { --card-color: var(--green);   --card-glow: var(--green-glow); }
    .card-pilot    { --card-color: var(--gold);    --card-glow: var(--gold-glow); }
    .card-commander{ --card-color: var(--purple);  --card-glow: var(--purple-glow); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ================================================================
       GAME SCREEN
       ================================================================ */
    .game-top {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 24px 0 16px;
      padding: 0 4px;
    }
    .game-level-badge {
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 99px;
      background: var(--level-color-subtle);
      color: var(--level-color);
    }
    .game-score {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold);
    }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      height: 10px;
      background: var(--bg-card);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 28px;
      border: 1px solid var(--border-subtle);
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--level-color), var(--level-color-light));
      transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 0 12px var(--level-color-glow);
    }

    /* Question card */
    .question-card {
      width: 100%;
      background: var(--bg-card);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 36px 28px;
      text-align: center;
      margin-bottom: 24px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .question-card.correct {
      border-color: var(--green);
      box-shadow: 0 0 30px var(--green-glow);
    }
    .question-card.wrong {
      border-color: var(--red);
      box-shadow: 0 0 30px var(--red-glow);
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .question-label {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .question-text {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 7vw, 3rem);
      font-weight: 800;
      line-height: 1.3;
      color: var(--text);
    }
    .question-hint {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 4px;
    }

    /* Answer options */
    .answers {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .answer-btn {
      background: var(--bg-card);
      border: 2px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 18px 12px;
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all 0.25s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .answer-btn:hover:not(.disabled) {
      border-color: var(--level-color);
      background: var(--level-color-subtle);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--level-color-glow);
    }
    .answer-btn:active:not(.disabled) { transform: translateY(0); }
    .answer-btn.selected-correct {
      border-color: var(--green);
      background: rgba(52,211,153,0.15);
      color: var(--green);
      box-shadow: 0 0 20px var(--green-glow);
    }
    .answer-btn.selected-wrong {
      border-color: var(--red);
      background: rgba(248,113,113,0.12);
      color: var(--red);
    }
    .answer-btn.reveal-correct {
      border-color: var(--green);
      background: rgba(52,211,153,0.1);
    }
    .answer-btn.disabled { pointer-events: none; opacity: 0.6; }

    /* Feedback overlay */
    .feedback {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
    }
    .feedback.show { display: flex; }
    .feedback-emoji {
      font-size: 80px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* ================================================================
       RESULTS SCREEN
       ================================================================ */
    .results-wrap {
      text-align: center;
      margin-top: 60px;
      animation: fadeUp 0.6s ease-out both;
    }
    .results-emoji { font-size: 72px; display: block; margin-bottom: 12px; }
    .results-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .results-subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 32px;
    }

    .results-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 36px;
    }
    .stat-box {
      background: var(--bg-card);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 18px 12px;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    /* Stars display */
    .stars-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }
    .star {
      font-size: 36px;
      animation: starPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .star:nth-child(1) { animation-delay: 0.2s; }
    .star:nth-child(2) { animation-delay: 0.4s; }
    .star:nth-child(3) { animation-delay: 0.6s; }
    @keyframes starPop {
      0% { transform: scale(0) rotate(-30deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .action-btn {
      padding: 16px 36px;
      border-radius: 99px;
      border: none;
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: #fff;
      box-shadow: 0 6px 24px var(--blue-glow);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--blue-glow); }
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-muted);
      border: 1.5px solid var(--border-subtle);
    }
    .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); transform: translateY(-2px); }

    /* ---- Input mode (for typed answers) ---- */
    .input-wrap {
      width: 100%;
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .answer-input {
      width: 140px;
      padding: 16px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border-subtle);
      background: var(--bg-card);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: border-color 0.3s ease;
      -moz-appearance: textfield;
    }
    .answer-input::-webkit-inner-spin-button,
    .answer-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .answer-input:focus { border-color: var(--level-color); }
    .submit-btn {
      padding: 16px 28px;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(135deg, var(--level-color), var(--level-color-light));
      color: #fff;
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--level-color-glow); }

    /* ---- Mobile ---- */
    @media (max-width: 480px) {
      .app { padding: 16px 14px 32px; }
      .level-grid { gap: 12px; }
      .level-card { padding: 18px 14px; }
      .question-card { padding: 28px 20px; min-height: 150px; }
      .answer-btn { padding: 14px 10px; font-size: 1.15rem; }
      .results-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>

  <div class="app">
    <a class="home-btn" href="index.html" title="Back to apps">🏠</a>

    <!-- ============ LEVEL SELECT ============ -->
    <div class="screen active" id="screen-select">
      <div class="level-header">
        <span class="icon">🪐</span>
        <h1>Math Galaxy</h1>
        <p>Choose your rank, space cadet!</p>
      </div>
      <div class="level-grid">
        <div class="level-card card-cadet" onclick="startGame('cadet')">
          <span class="rank-icon">🛸</span>
          <div class="rank-name">Cadet</div>
          <div class="rank-ages">Ages 4–6</div>
          <div class="rank-topics">Counting · Adding to 10 · Shapes</div>
        </div>
        <div class="level-card card-explorer" onclick="startGame('explorer')">
          <span class="rank-icon">🚀</span>
          <div class="rank-name">Explorer</div>
          <div class="rank-ages">Ages 6–8</div>
          <div class="rank-topics">Add & subtract to 20 · Patterns · Comparing</div>
        </div>
        <div class="level-card card-pilot" onclick="startGame('pilot')">
          <span class="rank-icon">🌟</span>
          <div class="rank-name">Pilot</div>
          <div class="rank-ages">Ages 8–10</div>
          <div class="rank-topics">Multiply · Divide · Fractions intro</div>
        </div>
        <div class="level-card card-commander" onclick="startGame('commander')">
          <span class="rank-icon">👨‍🚀</span>
          <div class="rank-name">Commander</div>
          <div class="rank-ages">Ages 10–12</div>
          <div class="rank-topics">Big numbers · Fractions · Decimals · %</div>
        </div>
      </div>
    </div>

    <!-- ============ GAME SCREEN ============ -->
    <div class="screen" id="screen-game">
      <div class="game-top">
        <div class="game-level-badge" id="gameBadge"></div>
        <div class="game-score" id="gameScore">⭐ 0</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="question-card" id="questionCard">
        <div class="question-label" id="qLabel"></div>
        <div class="question-text" id="qText"></div>
        <div class="question-hint" id="qHint"></div>
      </div>
      <div class="answers" id="answersWrap"></div>
    </div>

    <!-- ============ RESULTS SCREEN ============ -->
    <div class="screen" id="screen-results">
      <div class="results-wrap">
        <span class="results-emoji" id="resultsEmoji"></span>
        <div class="results-title" id="resultsTitle"></div>
        <div class="results-subtitle" id="resultsSub"></div>
        <div class="stars-row" id="starsRow"></div>
        <div class="results-stats" id="resultsStats"></div>
        <div>
          <button class="action-btn btn-primary" onclick="playAgain()">Play Again 🔁</button>
          <button class="action-btn btn-secondary" onclick="goHome()">Other Levels 🪐</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Feedback overlay -->
  <div class="feedback" id="feedback">
    <span class="feedback-emoji" id="feedbackEmoji"></span>
  </div>

  <script>
    /* ================================================================
       MATH GALAXY — Game Engine
       ================================================================ */

    const TOTAL_QUESTIONS = 10;
    let currentLevel = '';
    let questions = [];
    let currentQ = 0;
    let score = 0;
    let startTime = 0;

    /* ---- Level color themes ---- */
    const THEMES = {
      cadet:    { color: '#22D3EE', light: '#67E8F9', glow: 'rgba(34,211,238,0.35)', subtle: 'rgba(34,211,238,0.12)', name: '🛸 Cadet' },
      explorer: { color: '#34D399', light: '#6EE7B7', glow: 'rgba(52,211,153,0.35)', subtle: 'rgba(52,211,153,0.12)', name: '🚀 Explorer' },
      pilot:    { color: '#FBBF24', light: '#FDE68A', glow: 'rgba(251,191,36,0.35)', subtle: 'rgba(251,191,36,0.12)', name: '🌟 Pilot' },
      commander:{ color: '#A78BFA', light: '#C4B5FD', glow: 'rgba(167,139,250,0.35)',subtle: 'rgba(167,139,250,0.12)', name: '👨‍🚀 Commander' },
    };

    function setTheme(level) {
      const t = THEMES[level];
      const root = document.documentElement.style;
      root.setProperty('--level-color', t.color);
      root.setProperty('--level-color-light', t.light);
      root.setProperty('--level-color-glow', t.glow);
      root.setProperty('--level-color-subtle', t.subtle);
    }

    /* ---- Screen management ---- */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
    }

    /* ---- Random helpers ---- */
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = rand(0, i); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

    function generateDistractors(correct, count, min, max) {
      const set = new Set([correct]);
      let attempts = 0;
      while (set.size < count + 1 && attempts < 100) {
        let d = correct + rand(-Math.max(3, Math.abs(correct) || 3), Math.max(3, Math.abs(correct) || 3));
        if (d < min) d = min + rand(0, 3);
        if (d > max) d = max - rand(0, 3);
        if (d !== correct) set.add(d);
        attempts++;
      }
      while (set.size < count + 1) set.add(rand(min, max));
      const arr = [...set];
      return shuffle(arr);
    }

    /* ================================================================
       QUESTION GENERATORS PER LEVEL
       ================================================================ */

    function genCadet() {
      const types = ['count', 'add', 'shape', 'bigger'];
      const type = types[rand(0, types.length - 1)];

      if (type === 'count') {
        const n = rand(1, 10);
        const emoji = ['🍎','🌟','🚀','🐟','🦋','🎈','🍕','🐶'][rand(0, 7)];
        return {
          label: 'Counting',
          text: emoji.repeat(n),
          hint: 'How many do you see?',
          answer: n,
          options: generateDistractors(n, 3, 1, 10),
          mode: 'choice'
        };
      }
      if (type === 'add') {
        const a = rand(1, 5), b = rand(1, 5);
        return {
          label: 'Addition',
          text: `${a} + ${b} = ?`,
          hint: '',
          answer: a + b,
          options: generateDistractors(a + b, 3, 1, 10),
          mode: 'choice'
        };
      }
      if (type === 'shape') {
        const shapes = [
          { name: 'Circle', emoji: '⚪', sides: 0 },
          { name: 'Triangle', emoji: '🔺', sides: 3 },
          { name: 'Square', emoji: '🟧', sides: 4 },
        ];
        const s = shapes[rand(0, shapes.length - 1)];
        const names = shapes.map(x => x.name);
        return {
          label: 'Shapes',
          text: s.emoji,
          hint: 'What shape is this?',
          answer: s.name,
          options: shuffle([...names, 'Star'].slice(0, 4)),
          mode: 'choice'
        };
      }
      // bigger
      const a = rand(1, 10), b = rand(1, 10);
      if (a === b) return genCadet(); // retry
      return {
        label: 'Comparing',
        text: `${a}  or  ${b}`,
        hint: 'Which number is bigger?',
        answer: Math.max(a, b),
        options: shuffle([a, b]),
        mode: 'choice'
      };
    }

    function genExplorer() {
      const types = ['add', 'sub', 'missing', 'compare', 'double'];
      const type = types[rand(0, types.length - 1)];

      if (type === 'add') {
        const a = rand(5, 12), b = rand(3, 8);
        return { label: 'Addition', text: `${a} + ${b} = ?`, hint: '', answer: a + b, options: generateDistractors(a + b, 3, 5, 25), mode: 'choice' };
      }
      if (type === 'sub') {
        const a = rand(8, 20), b = rand(1, a - 1);
        return { label: 'Subtraction', text: `${a} − ${b} = ?`, hint: '', answer: a - b, options: generateDistractors(a - b, 3, 0, 20), mode: 'choice' };
      }
      if (type === 'missing') {
        const a = rand(3, 10), b = rand(3, 10);
        return { label: 'Missing Number', text: `${a} + ? = ${a + b}`, hint: 'What goes in place of ?', answer: b, options: generateDistractors(b, 3, 1, 15), mode: 'choice' };
      }
      if (type === 'compare') {
        const a = rand(5, 20), b = rand(5, 20);
        if (a === b) return genExplorer();
        const sym = a > b ? '>' : '<';
        return { label: 'Comparing', text: `${a}  ◻  ${b}`, hint: 'What goes in the box?', answer: sym, options: shuffle(['>', '<', '=']), mode: 'choice' };
      }
      // double
      const a = rand(2, 10);
      return { label: 'Doubles', text: `${a} + ${a} = ?`, hint: '', answer: a * 2, options: generateDistractors(a * 2, 3, 2, 24), mode: 'choice' };
    }

    function genPilot() {
      const types = ['mult', 'div', 'frac_visual', 'word', 'missing_mult'];
      const type = types[rand(0, types.length - 1)];

      if (type === 'mult') {
        const a = rand(2, 9), b = rand(2, 9);
        return { label: 'Multiplication', text: `${a} × ${b} = ?`, hint: '', answer: a * b, options: generateDistractors(a * b, 3, 4, 90), mode: 'choice' };
      }
      if (type === 'div') {
        const b = rand(2, 9), ans = rand(2, 9);
        return { label: 'Division', text: `${b * ans} ÷ ${b} = ?`, hint: '', answer: ans, options: generateDistractors(ans, 3, 1, 15), mode: 'choice' };
      }
      if (type === 'frac_visual') {
        const denom = [2, 3, 4][rand(0, 2)];
        const num = rand(1, denom - 1);
        const filled = '🟦'.repeat(num);
        const empty = '⬜'.repeat(denom - num);
        return { label: 'Fractions', text: filled + empty, hint: `What fraction is filled?`, answer: `${num}/${denom}`, options: shuffle([`${num}/${denom}`, `${denom - num}/${denom}`, `${num}/${denom + 1}`, `${denom}/${num}`]), mode: 'choice' };
      }
      if (type === 'word') {
        const price = rand(3, 9), qty = rand(2, 5);
        return { label: 'Word Problem', text: `${qty} toys cost $${price} each`, hint: 'What is the total?', answer: `$${price * qty}`, options: shuffle([`$${price * qty}`, `$${price * qty + rand(1,5)}`, `$${price * qty - rand(1,3)}`, `$${price + qty}`]), mode: 'choice' };
      }
      // missing_mult
      const a = rand(2, 9), b = rand(2, 9);
      return { label: 'Missing Factor', text: `${a} × ? = ${a * b}`, hint: '', answer: b, options: generateDistractors(b, 3, 1, 12), mode: 'choice' };
    }

    function genCommander() {
      const types = ['big_add', 'big_mult', 'fraction_add', 'decimal', 'percent', 'order_ops'];
      const type = types[rand(0, types.length - 1)];

      if (type === 'big_add') {
        const a = rand(100, 500), b = rand(100, 500);
        return { label: 'Big Addition', text: `${a} + ${b} = ?`, hint: '', answer: a + b, options: generateDistractors(a + b, 3, 200, 1100), mode: 'choice' };
      }
      if (type === 'big_mult') {
        const a = rand(12, 25), b = rand(3, 9);
        return { label: 'Multiplication', text: `${a} × ${b} = ?`, hint: '', answer: a * b, options: generateDistractors(a * b, 3, 20, 250), mode: 'choice' };
      }
      if (type === 'fraction_add') {
        const d = [4, 6, 8][rand(0, 2)];
        const a = rand(1, d / 2), b = rand(1, d / 2);
        const sum = a + b;
        return { label: 'Fraction Addition', text: `${a}/${d} + ${b}/${d} = ?`, hint: 'Same denominator!', answer: `${sum}/${d}`, options: shuffle([`${sum}/${d}`, `${sum}/${d * 2}`, `${a + b + 1}/${d}`, `${a}/${d + b}`]), mode: 'choice' };
      }
      if (type === 'decimal') {
        const a = (rand(11, 95) / 10).toFixed(1);
        const b = (rand(11, 95) / 10).toFixed(1);
        const ans = (parseFloat(a) + parseFloat(b)).toFixed(1);
        const opts = [ans];
        while (opts.length < 4) {
          const fake = (parseFloat(ans) + (rand(-20, 20) / 10)).toFixed(1);
          if (!opts.includes(fake) && parseFloat(fake) > 0) opts.push(fake);
        }
        return { label: 'Decimals', text: `${a} + ${b} = ?`, hint: '', answer: ans, options: shuffle(opts), mode: 'choice' };
      }
      if (type === 'percent') {
        const pcts = [10, 20, 25, 50];
        const p = pcts[rand(0, pcts.length - 1)];
        const base = rand(2, 10) * (100 / p);
        const ans = base * p / 100;
        return { label: 'Percentages', text: `${p}% of ${base} = ?`, hint: '', answer: ans, options: generateDistractors(ans, 3, 1, Math.max(ans * 2, 20)), mode: 'choice' };
      }
      // order_ops
      const a = rand(2, 8), b = rand(2, 5), c = rand(1, 6);
      const ans = a + b * c;
      return { label: 'Order of Operations', text: `${a} + ${b} × ${c} = ?`, hint: 'Multiply first!', answer: ans, options: generateDistractors(ans, 3, 5, 60), mode: 'choice' };
    }

    const GENERATORS = { cadet: genCadet, explorer: genExplorer, pilot: genPilot, commander: genCommander };

    /* ================================================================
       GAME FLOW
       ================================================================ */

    function startGame(level) {
      currentLevel = level;
      score = 0;
      currentQ = 0;
      startTime = Date.now();
      setTheme(level);

      // Generate questions
      questions = [];
      for (let i = 0; i < TOTAL_QUESTIONS; i++) {
        questions.push(GENERATORS[level]());
      }

      document.getElementById('gameBadge').textContent = THEMES[level].name;
      updateScore();
      showScreen('game');
      showQuestion();
    }

    function updateScore() {
      document.getElementById('gameScore').textContent = `⭐ ${score}`;
    }

    function showQuestion() {
      const q = questions[currentQ];
      const card = document.getElementById('questionCard');
      card.className = 'question-card';

      document.getElementById('qLabel').textContent = q.label;
      document.getElementById('qText').textContent = q.text;
      document.getElementById('qHint').textContent = q.hint || '';

      // Progress
      document.getElementById('progressFill').style.width = `${(currentQ / TOTAL_QUESTIONS) * 100}%`;

      // Render options
      const wrap = document.getElementById('answersWrap');
      wrap.innerHTML = '';

      if (q.mode === 'choice') {
        q.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.textContent = opt;
          btn.onclick = () => handleAnswer(btn, opt, q);
          wrap.appendChild(btn);
        });
      }
    }

    function handleAnswer(btn, selected, q) {
      const correct = String(selected) === String(q.answer);
      const card = document.getElementById('questionCard');
      const allBtns = document.querySelectorAll('.answer-btn');

      allBtns.forEach(b => {
        b.classList.add('disabled');
        if (String(b.textContent) === String(q.answer)) b.classList.add('reveal-correct');
      });

      if (correct) {
        score++;
        updateScore();
        btn.classList.add('selected-correct');
        card.classList.add('correct');
        showFeedback(['🎉','🌟','✨','💫','🚀','👏'][rand(0,5)]);
      } else {
        btn.classList.add('selected-wrong');
        card.classList.add('wrong');
        showFeedback(['😬','🤔','💪','🔄'][rand(0,3)]);
      }

      setTimeout(() => {
        currentQ++;
        if (currentQ >= TOTAL_QUESTIONS) {
          finishGame();
        } else {
          showQuestion();
        }
      }, 1200);
    }

    function showFeedback(emoji) {
      const el = document.getElementById('feedback');
      document.getElementById('feedbackEmoji').textContent = emoji;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 900);
    }

    function finishGame() {
      const elapsed = Math.round((Date.now() - startTime) / 1000);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      const pct = Math.round((score / TOTAL_QUESTIONS) * 100);

      document.getElementById('progressFill').style.width = '100%';

      // Stars: 1 for trying, 2 for ≥60%, 3 for ≥90%
      const stars = pct >= 90 ? 3 : pct >= 60 ? 2 : 1;

      let emoji, title, sub;
      if (pct >= 90) { emoji = '🏆'; title = 'Mission Complete!'; sub = `Amazing work! ${score} out of ${TOTAL_QUESTIONS} correct!`; }
      else if (pct >= 70) { emoji = '🌟'; title = 'Great Flying!'; sub = `${score} out of ${TOTAL_QUESTIONS} — almost perfect!`; }
      else if (pct >= 50) { emoji = '🚀'; title = 'Good Effort!'; sub = `${score} out of ${TOTAL_QUESTIONS} — keep practicing!`; }
      else { emoji = '💪'; title = 'Keep Going!'; sub = `${score} out of ${TOTAL_QUESTIONS} — you'll get better!`; }

      document.getElementById('resultsEmoji').textContent = emoji;
      document.getElementById('resultsTitle').textContent = title;
      document.getElementById('resultsSub').textContent = sub;

      // Stars
      const starsRow = document.getElementById('starsRow');
      starsRow.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const span = document.createElement('span');
        span.className = 'star';
        span.textContent = i < stars ? '⭐' : '☆';
        starsRow.appendChild(span);
      }

      // Stats
      document.getElementById('resultsStats').innerHTML = `
        <div class="stat-box"><div class="stat-value" style="color:var(--green)">${pct}%</div><div class="stat-label">Score</div></div>
        <div class="stat-box"><div class="stat-value" style="color:var(--gold)">${score}/${TOTAL_QUESTIONS}</div><div class="stat-label">Correct</div></div>
        <div class="stat-box"><div class="stat-value" style="color:var(--cyan)">${mins}:${String(secs).padStart(2,'0')}</div><div class="stat-label">Time</div></div>
      `;

      showScreen('results');
    }

    function playAgain() { startGame(currentLevel); }
    function goHome() { showScreen('select'); }
  </script>
</body>
