<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Descubre Chile 🇨🇱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg-deep:#0A0F1C;--bg-surface:#111827;--bg-card:#1A2234;--border-subtle:rgba(255,255,255,0.07);--chile-red:#D93636;--chile-red-glow:rgba(217,54,54,0.35);--chile-blue:#0039A6;--andes-gold:#E8A838;--andes-gold-glow:rgba(232,168,56,0.4);--patagonia-teal:#2CB5A0;--atacama-orange:#E87040;--snow-white:#F0F4FF;--green:#34D399;--green-glow:rgba(52,211,153,0.4);--red:#F87171;--red-glow:rgba(248,113,113,0.35);--text:#F0EDFF;--text-muted:#8B95B0;--font-display:'Baloo 2','Nunito',cursive;--font-body:'Nunito',system-ui,sans-serif;--radius:20px;--radius-sm:14px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{height:100%;font-size:16px}
    body{min-height:100%;font-family:var(--font-body);background:var(--bg-deep);color:var(--text);overflow-x:hidden;display:flex;flex-direction:column;align-items:center}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(1.5px 1.5px at 12% 18%,rgba(255,255,255,0.6),transparent),radial-gradient(1px 1px at 30% 40%,rgba(255,255,255,0.4),transparent),radial-gradient(2px 2px at 55% 12%,rgba(232,168,56,0.6),transparent),radial-gradient(1px 1px at 70% 50%,rgba(255,255,255,0.3),transparent),radial-gradient(1.5px 1.5px at 85% 25%,rgba(217,54,54,0.5),transparent),radial-gradient(1px 1px at 15% 75%,rgba(44,181,160,0.4),transparent);pointer-events:none;z-index:0;animation:twinkle 7s ease-in-out infinite alternate}
    @keyframes twinkle{0%{opacity:0.5}100%{opacity:1}}
    .atmo{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;animation:drift 22s ease-in-out infinite alternate}
    .atmo-1{width:400px;height:400px;background:rgba(217,54,54,0.08);top:-80px;right:-60px}
    .atmo-2{width:350px;height:350px;background:rgba(0,57,166,0.08);bottom:10%;left:-70px;animation-delay:-6s}
    @keyframes drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-15px) scale(1.06)}100%{transform:translate(-10px,10px) scale(0.97)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
    @keyframes flagWave{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    @keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .app{position:relative;z-index:1;width:100%;max-width:640px;padding:24px 20px 40px;min-height:100vh;display:flex;flex-direction:column}
    .home-btn{position:absolute;top:24px;left:20px;width:42px;height:42px;border-radius:12px;border:1.5px solid var(--border-subtle);background:var(--bg-card);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:20px;text-decoration:none;transition:all 0.25s ease;z-index:10}
    .home-btn:hover{border-color:var(--chile-red);color:var(--chile-red);transform:scale(1.08)}
    .user-badge{position:absolute;top:24px;right:20px;display:flex;align-items:center;gap:8px;padding:6px 14px 6px 8px;background:var(--bg-card);border:1.5px solid var(--border-subtle);border-radius:99px;z-index:10;font-family:var(--font-display);font-size:0.85rem;font-weight:700;color:var(--text)}
    .user-badge-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid}
    .app-header{text-align:center;margin:50px 0 12px;animation:fadeUp 0.6s ease-out both}
    .app-header .flag{font-size:48px;display:block;margin-bottom:4px;animation:flagWave 3s ease-in-out infinite}
    .app-header h1{font-family:var(--font-display);font-size:clamp(1.8rem,5vw,2.4rem);font-weight:800;background:linear-gradient(135deg,var(--chile-red),var(--snow-white),var(--chile-blue));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 5s ease-in-out infinite}
    .app-header p{color:var(--text-muted);font-weight:600;font-size:0.9rem}
    .app-header .greeting{color:var(--andes-gold);font-weight:700;font-size:0.85rem}
    .progress-bar{width:100%;height:8px;background:var(--bg-card);border-radius:99px;overflow:hidden;margin:8px 0 4px;border:1px solid var(--border-subtle)}
    .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--chile-red),var(--andes-gold));transition:width 0.6s ease;box-shadow:0 0 10px var(--chile-red-glow)}
    .progress-label{font-size:0.72rem;font-weight:700;color:var(--text-muted);text-align:center;margin-bottom:12px}
    .tab-bar{display:flex;gap:4px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:4px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
    .tab-bar::-webkit-scrollbar{display:none}
    .tab-btn{flex:1;padding:10px 8px;border-radius:10px;border:none;background:none;color:var(--text-muted);font-family:var(--font-display);font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.2s ease;white-space:nowrap;text-align:center}
    .tab-btn:hover{color:var(--text);background:rgba(255,255,255,0.04)}
    .tab-btn.active{background:var(--chile-red);color:#fff;box-shadow:0 2px 12px var(--chile-red-glow)}
    .tab-content{display:none;flex-direction:column;align-items:center;width:100%;animation:fadeUp 0.4s ease-out}
    .tab-content.active{display:flex}
    .map-wrap{width:100%;max-width:280px;margin:0 auto 20px}
    .map-svg{width:100%;height:auto}
    .map-region{cursor:pointer;transition:all 0.3s ease;stroke:#1A2234;stroke-width:2}
    .map-region:hover{filter:brightness(1.2);stroke:var(--andes-gold);stroke-width:3}
    .map-region.visited{stroke:var(--green);stroke-width:2.5}
    .region-label{font-family:var(--font-display);font-size:8px;font-weight:700;fill:var(--text);pointer-events:none;text-anchor:middle}
    .map-legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
    .map-legend-item{display:flex;align-items:center;gap:4px;font-size:0.72rem;font-weight:600;color:var(--text-muted)}
    .map-legend-dot{width:10px;height:10px;border-radius:50%}
    .region-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;padding:20px}
    .region-modal.active{display:flex}
    .region-card{background:var(--bg-surface);border:1.5px solid rgba(255,255,255,0.1);border-radius:var(--radius);padding:28px;width:100%;max-width:460px;max-height:80vh;overflow-y:auto;animation:popIn 0.3s ease-out;position:relative}
    .region-card h2{font-family:var(--font-display);font-size:1.4rem;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:10px}
    .region-card .region-sub{color:var(--text-muted);font-size:0.85rem;font-weight:600;margin-bottom:16px}
    .region-card .fact-item{padding:12px 0;border-top:1px solid rgba(255,255,255,0.05)}
    .region-card .fact-item h4{font-family:var(--font-display);font-size:0.95rem;font-weight:700;margin-bottom:4px}
    .region-card .fact-item p{color:var(--text-muted);font-size:0.85rem;line-height:1.6;font-weight:600}
    .fun-fact{margin-top:8px;padding:8px 12px;border-radius:var(--radius-sm);background:rgba(232,168,56,0.06);border-left:3px solid var(--andes-gold);font-size:0.8rem;color:var(--andes-gold)}
    .close-modal{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:none;color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .close-modal:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
    .story-list{display:flex;flex-direction:column;gap:14px;width:100%}
    .story-card{background:var(--bg-card);border:1.5px solid var(--border-subtle);border-radius:var(--radius);padding:22px;line-height:1.7;cursor:pointer;transition:all 0.25s ease}
    .story-card:hover{border-color:var(--chile-red);transform:translateY(-2px)}
    .story-card h3{font-family:var(--font-display);font-size:1rem;font-weight:700;margin-bottom:6px}
    .story-card p{color:var(--text-muted);font-size:0.88rem;font-weight:600}
    .story-card:not(.expanded) p{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .story-card:not(.expanded) .fun-fact{display:none}
    .topic-select{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:16px}
    .topic-btn{padding:10px 16px;border-radius:99px;border:1.5px solid var(--border-subtle);background:var(--bg-card);color:var(--text-muted);font-family:var(--font-display);font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.25s}
    .topic-btn:hover{border-color:var(--chile-red);color:var(--text)}
    .topic-btn.active{background:var(--chile-red);border-color:var(--chile-red);color:#fff}
    .memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:400px;margin:0 auto}
    .memory-card{aspect-ratio:3/4;border-radius:var(--radius-sm);cursor:pointer;perspective:600px;position:relative}
    .memory-card-inner{width:100%;height:100%;position:relative;transition:transform 0.5s ease;transform-style:preserve-3d}
    .memory-card.flipped .memory-card-inner,.memory-card.matched .memory-card-inner{transform:rotateY(180deg)}
    .memory-card.matched{opacity:0.7;pointer-events:none}
    .memory-front,.memory-back{position:absolute;inset:0;border-radius:var(--radius-sm);backface-visibility:hidden;display:flex;align-items:center;justify-content:center;padding:8px;text-align:center}
    .memory-back{background:linear-gradient(135deg,var(--chile-red),var(--andes-gold));font-size:28px;border:2px solid rgba(255,255,255,0.15)}
    .memory-front{background:var(--bg-card);border:2px solid var(--border-subtle);transform:rotateY(180deg);flex-direction:column;gap:4px}
    .memory-front .mf-icon{font-size:24px}
    .memory-front .mf-text{font-family:var(--font-display);font-size:0.65rem;font-weight:700;color:var(--text);line-height:1.2}
    .memory-stats{display:flex;gap:16px;justify-content:center;margin:16px 0;font-family:var(--font-display);font-weight:700;color:var(--text-muted);font-size:0.9rem}
    .memory-stats span{color:var(--andes-gold)}
    .memory-msg{text-align:center;font-family:var(--font-display);font-size:1.1rem;font-weight:700;min-height:28px;margin:8px 0}
    .quiz-progress-wrap{width:100%;height:10px;background:var(--bg-card);border-radius:99px;overflow:hidden;margin-bottom:20px;border:1px solid var(--border-subtle)}
    .quiz-progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--chile-red),var(--atacama-orange));transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 0 12px var(--chile-red-glow)}
    .quiz-top{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .quiz-badge{font-family:var(--font-display);font-size:0.85rem;font-weight:700;padding:6px 14px;border-radius:99px;background:rgba(217,54,54,0.12);color:var(--chile-red)}
    .quiz-score{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--andes-gold)}
    .quiz-card{width:100%;background:var(--bg-card);border:1.5px solid var(--border-subtle);border-radius:var(--radius);padding:28px 20px;text-align:center;margin-bottom:16px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:border-color 0.3s,box-shadow 0.3s}
    .quiz-card.correct{border-color:var(--green);box-shadow:0 0 24px var(--green-glow)}
    .quiz-card.wrong{border-color:var(--red);box-shadow:0 0 24px var(--red-glow);animation:shake 0.4s ease}
    .quiz-q-text{font-family:var(--font-display);font-size:clamp(1.1rem,3.5vw,1.4rem);font-weight:800;line-height:1.4}
    .quiz-opts{width:100%;display:flex;flex-direction:column;gap:8px}
    .quiz-opt-btn{width:100%;padding:14px;border-radius:var(--radius-sm);border:1.5px solid var(--border-subtle);background:var(--bg-card);color:var(--text);font-family:var(--font-body);font-size:0.92rem;font-weight:700;cursor:pointer;text-align:left;transition:all 0.25s}
    .quiz-opt-btn:hover{border-color:var(--chile-red);background:rgba(217,54,54,0.06)}
    .quiz-opt-btn.disabled{pointer-events:none}
    .quiz-opt-btn.sel-correct{background:var(--green);border-color:var(--green);color:#fff}
    .quiz-opt-btn.sel-wrong{background:var(--red);border-color:var(--red);color:#fff}
    .quiz-opt-btn.reveal{border-color:var(--green);color:var(--green)}
    .results-box{text-align:center;padding:40px 20px;animation:fadeUp 0.5s ease-out}
    .results-box .r-emoji{font-size:64px;display:block;margin-bottom:8px}
    .results-box .r-title{font-family:var(--font-display);font-size:1.6rem;font-weight:800}
    .results-box .r-sub{color:var(--text-muted);font-weight:600;margin:8px 0 20px}
    .results-box .r-stars{font-size:32px;display:flex;gap:6px;justify-content:center;margin-bottom:16px}
    .btn-red{padding:14px 24px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--chile-red),var(--atacama-orange));color:#fff;font-family:var(--font-display);font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.25s;box-shadow:0 4px 16px var(--chile-red-glow)}
    .btn-red:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--chile-red-glow)}
    .btn-ghost{padding:14px 24px;border-radius:var(--radius-sm);border:1.5px solid var(--border-subtle);background:none;color:var(--text-muted);font-family:var(--font-display);font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.25s}
    .btn-ghost:hover{border-color:rgba(255,255,255,0.2);color:var(--text)}
    .feedback-float{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:80px;pointer-events:none;z-index:2000;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s;opacity:0}
    .feedback-float.show{transform:translate(-50%,-50%) scale(1);opacity:1}
    @media(max-width:480px){.app{padding:16px 14px 32px}.memory-grid{grid-template-columns:repeat(3,1fr);gap:8px}.map-wrap{max-width:240px}}
  </style>
</head>
<body>
<div class="atmo atmo-1"></div><div class="atmo atmo-2"></div>
<div class="app">
  <a class="home-btn" href="index.html">🏠</a>
  <div class="user-badge" id="userBadge" style="display:none"><div class="user-badge-avatar" id="ubAvatar"></div><span id="ubName"></span></div>
  <div class="app-header"><span class="flag">🇨🇱</span><h1>Descubre Chile</h1><p>¡Aprende jugando sobre un país increíble!</p><div class="greeting" id="greeting"></div></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">Chile explorado: 0%</div>
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="mapa">🗺️ Mapa</button>
    <button class="tab-btn" data-tab="historia">📖 Historia</button>
    <button class="tab-btn" data-tab="juegos">🎮 Juegos</button>
    <button class="tab-btn" data-tab="quiz">⭐ Quiz</button>
  </div>
  <!-- MAPA -->
  <div class="tab-content active" id="tab-mapa">
    <p style="text-align:center;color:var(--text-muted);font-size:0.85rem;font-weight:600;margin-bottom:12px">¡Toca una región para explorarla!</p>
    <div class="map-wrap">
      <svg viewBox="0 0 200 600" class="map-svg">
        <path class="map-region" id="reg-norte" d="M70,10 L130,10 L135,50 L140,100 L130,140 L110,150 L90,145 L75,130 L65,90 L60,50 Z" fill="#E87040" onclick="openRegion('norte')"/>
        <text class="region-label" x="100" y="80">Norte</text>
        <path class="map-region" id="reg-centro" d="M90,145 L110,150 L130,140 L125,200 L120,250 L105,260 L85,255 L80,220 L78,180 Z" fill="#D93636" onclick="openRegion('centro')"/>
        <text class="region-label" x="102" y="200">Centro</text>
        <path class="map-region" id="reg-sur" d="M85,255 L105,260 L120,250 L115,330 L108,370 L95,380 L80,365 L75,320 L78,280 Z" fill="#2CB5A0" onclick="openRegion('sur')"/>
        <text class="region-label" x="97" y="315">Sur</text>
        <path class="map-region" id="reg-patagonia" d="M80,365 L95,380 L108,370 L105,440 L100,500 L95,540 L85,555 L78,530 L72,480 L70,430 L75,390 Z" fill="#0039A6" onclick="openRegion('patagonia')"/>
        <text class="region-label" x="90" y="465">Patagonia</text>
        <ellipse class="map-region" id="reg-pascua" cx="170" cy="280" rx="22" ry="18" fill="#E8A838" onclick="openRegion('pascua')"/>
        <text class="region-label" x="170" y="283" style="font-size:6px">Rapa Nui</text>
        <path d="M130,10 L140,100 L130,140 L125,200 L120,250 L115,330 L108,370 L105,440 L100,500 L95,540" fill="none" stroke="rgba(232,168,56,0.4)" stroke-width="3" stroke-dasharray="6,4"/>
        <text x="148" y="200" style="font-size:6px;fill:var(--andes-gold);font-weight:700" transform="rotate(10,148,200)">Los Andes</text>
      </svg>
    </div>
    <div class="map-legend">
      <div class="map-legend-item"><div class="map-legend-dot" style="background:#E87040"></div>Norte</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:#D93636"></div>Centro</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:#2CB5A0"></div>Sur</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:#0039A6"></div>Patagonia</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:#E8A838"></div>Rapa Nui</div>
    </div>
  </div>
  <!-- HISTORIA -->
  <div class="tab-content" id="tab-historia"><div class="topic-select" id="historyTopics"></div><div class="story-list" id="storyList"></div></div>
  <!-- JUEGOS -->
  <div class="tab-content" id="tab-juegos">
    <p style="text-align:center;font-family:var(--font-display);font-size:1.1rem;font-weight:700;margin-bottom:4px">🃏 Memoria de Pioneros</p>
    <p style="text-align:center;color:var(--text-muted);font-size:0.82rem;font-weight:600;margin-bottom:12px">Encuentra las parejas: personaje ↔ logro</p>
    <div class="memory-stats">Movimientos: <span id="memMoves">0</span> &nbsp;|&nbsp; Parejas: <span id="memPairs">0</span>/<span id="memTotal">0</span></div>
    <div class="memory-grid" id="memoryGrid"></div>
    <div class="memory-msg" id="memoryMsg"></div>
    <div style="text-align:center;margin-top:12px"><button class="btn-red" onclick="initMemory()">🔄 Jugar de nuevo</button></div>
  </div>
  <!-- QUIZ -->
  <div class="tab-content" id="tab-quiz"><div id="quizArea"></div></div>
</div>
<div class="region-modal" id="regionModal" onclick="if(event.target===this)closeRegion()"><div class="region-card"><button class="close-modal" onclick="closeRegion()">✕</button><h2 id="rmTitle"></h2><div class="region-sub" id="rmSub"></div><div id="rmFacts"></div><div style="text-align:center;margin-top:16px"><button class="btn-red" onclick="closeRegion()">¡Entendido! ✓</button></div></div></div>
<div class="feedback-float" id="feedback"><span id="feedbackEmoji"></span></div>
<script>
function getActiveUser(){try{return JSON.parse(localStorage.getItem('zs_active_user'))}catch{return null}}
function getUserKey(){const u=getActiveUser();return u?'zs_chile_'+u.name.toLowerCase().replace(/\s+/g,'_'):null}
function getUserProgress(){const k=getUserKey();if(!k)return{};try{return JSON.parse(localStorage.getItem(k))||{}}catch{return{}}}
function saveTopicProgress(id,stars,pct){const k=getUserKey();if(!k)return;const p=getUserProgress();const prev=p[id]||{bestStars:0,bestPct:0};p[id]={bestStars:Math.max(prev.bestStars,stars),bestPct:Math.max(prev.bestPct,pct),lastPlayed:new Date().toISOString()};localStorage.setItem(k,JSON.stringify(p))}
function saveVisited(id){const k=getUserKey();if(!k)return;const p=getUserProgress();if(!p.vr)p.vr=[];if(!p.vr.includes(id))p.vr.push(id);localStorage.setItem(k,JSON.stringify(p))}
function saveMemBest(m){const k=getUserKey();if(!k)return;const p=getUserProgress();if(!p.memBest||m<p.memBest)p.memBest=m;localStorage.setItem(k,JSON.stringify(p))}
function showFeedback(e){const el=document.getElementById('feedback');document.getElementById('feedbackEmoji').textContent=e;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),900)}

// Tab nav
document.getElementById('tabBar').addEventListener('click',e=>{
  if(!e.target.dataset.tab)return;
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+e.target.dataset.tab).classList.add('active');
  e.target.classList.add('active');
});

function updateProgress(){
  const p=getUserProgress();const regs=(p.vr||[]).length;
  const topics=Object.keys(p).filter(k=>k!=='vr'&&k!=='memBest'&&p[k].bestStars>0).length;
  const mem=p.memBest?1:0;const total=regs+topics+mem;const max=5+6+1;
  const pct=Math.min(100,Math.round((total/max)*100));
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent='Chile explorado: '+pct+'%';
  (p.vr||[]).forEach(id=>{const el=document.getElementById('reg-'+id);if(el)el.classList.add('visited')});
}

  {icon:'🗡️',name:'Pedro de Valdivia',match:'Fundó Santiago 1541'},
  {icon:'🇨🇱',name:'Bernardo O\'Higgins',match:'Padre de la Patria'},

  {icon:'⚽',name:'Alexis Sánchez',match:'Copa América 2015'}
];
let memCards=[],memFlipped=[],memMatched=0,memMoves=0,memLocked=false;
function initMemory(){memMatched=0;memMoves=0;memLocked=false;memFlipped=[];document.getElementById('memMoves').textContent='0';document.getElementById('memPairs').textContent='0';document.getElementById('memTotal').textContent=MEM_PAIRS.length;document.getElementById('memoryMsg').textContent='';
  const cards=[];MEM_PAIRS.forEach((p,i)=>{cards.push({id:i,type:'person',icon:p.icon,text:p.name,pid:i});cards.push({id:i,type:'fact',icon:'🏆',text:p.match,pid:i})});
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]]}memCards=cards;renderMem()}
function renderMem(){const g=document.getElementById('memoryGrid');g.innerHTML='';memCards.forEach((c,i)=>{const d=document.createElement('div');d.className='memory-card';if(c.matched)d.classList.add('matched');if(memFlipped.includes(i))d.classList.add('flipped');d.innerHTML='<div class="memory-card-inner"><div class="memory-back">🇨🇱</div><div class="memory-front"><span class="mf-icon">'+c.icon+'</span><span class="mf-text">'+c.text+'</span></div></div>';d.onclick=()=>flipCard(i);g.appendChild(d)})}
function flipCard(i){if(memLocked||memFlipped.includes(i)||memCards[i].matched)return;memFlipped.push(i);renderMem();if(memFlipped.length===2){memMoves++;document.getElementById('memMoves').textContent=memMoves;memLocked=true;const a=memCards[memFlipped[0]],b=memCards[memFlipped[1]];if(a.pid===b.pid&&a.type!==b.type){setTimeout(()=>{a.matched=true;b.matched=true;memMatched++;document.getElementById('memPairs').textContent=memMatched;memFlipped=[];memLocked=false;showFeedback('🎉');renderMem();if(memMatched===MEM_PAIRS.length){document.getElementById('memoryMsg').innerHTML='<span style="color:var(--green)">🏆 ¡Completado en '+memMoves+' movimientos!</span>';saveMemBest(memMoves);updateProgress()}},600)}else{setTimeout(()=>{memFlipped=[];memLocked=false;renderMem()},900)}}}

let qTopic='',qQs=[],qIdx=0,qScore=0;
function renderQuizMenu(){const prog=getUserProgress();let h='<p style="text-align:center;font-family:var(--font-display);font-size:1.1rem;font-weight:700;margin-bottom:12px">Elige un tema</p><div class="topic-select">';TOPICS.forEach(t=>{const done=prog[t.id]&&prog[t.id].bestStars>0;h+='<button class="topic-btn" onclick="startQuiz(\''+t.id+'\')">'+t.icon+' '+t.name+(done?' ⭐':'')+'</button>'});h+='</div>';document.getElementById('quizArea').innerHTML=h}
function startQuiz(id){qTopic=id;const u=getActiveUser();const age=u?u.age:null;let qs=[...QB[id]];if(age&&age<=6)qs=qs.sort(()=>Math.random()-0.5).slice(0,3);qQs=qs;qIdx=0;qScore=0;showQ()}
function showQ(){if(qIdx>=qQs.length){finishQ();return}const q=qQs[qIdx];const sh=[...q.o].sort(()=>Math.random()-0.5);let h='<div class="quiz-top"><div class="quiz-badge">Pregunta '+(qIdx+1)+'/'+qQs.length+'</div><div class="quiz-score">⭐ '+qScore+'</div></div>';h+='<div class="quiz-progress-wrap"><div class="quiz-progress-fill" style="width:'+(qIdx/qQs.length*100)+'%"></div></div>';h+='<div class="quiz-card" id="qC"><div class="quiz-q-text">'+q.q+'</div></div><div class="quiz-opts">';sh.forEach(o=>{h+='<button class="quiz-opt-btn" onclick="ans(this)">'+o+'</button>'});h+='</div>';document.getElementById('quizArea').innerHTML=h}
function ans(btn){const q=qQs[qIdx];const sel=btn.textContent;const ok=sel===q.a;document.querySelectorAll('.quiz-opt-btn').forEach(b=>{b.classList.add('disabled');if(b.textContent===q.a)b.classList.add('reveal')});if(ok){qScore++;btn.classList.add('sel-correct');document.getElementById('qC').classList.add('correct');showFeedback('🎉')}else{btn.classList.add('sel-wrong');document.getElementById('qC').classList.add('wrong');showFeedback('🤔')}setTimeout(()=>{qIdx++;showQ()},1200)}
function finishQ(){const pct=Math.round(qScore/qQs.length*100);const stars=pct>=90?3:pct>=60?2:1;saveTopicProgress(qTopic,stars,pct);updateProgress();let e,t,s;if(pct>=90){e='🏆';t='¡Excelente!';s=qScore+' de '+qQs.length+' — ¡eres experto/a!'}else if(pct>=60){e='🌟';t='¡Muy bien!';s=qScore+' de '+qQs.length+' — ¡gran conocimiento!'}else{e='💪';t='¡Sigue intentando!';s=qScore+' de '+qQs.length+' — lee las historias y vuelve.'}let st='';for(let i=0;i<3;i++)st+='<span>'+(i<stars?'⭐':'☆')+'</span>';document.getElementById('quizArea').innerHTML='<div class="results-box"><span class="r-emoji">'+e+'</span><div class="r-title">'+t+'</div><div class="r-sub">'+s+'</div><div class="r-stars">'+st+'</div><div style="display:flex;gap:10px;justify-content:center"><button class="btn-red" onclick="startQuiz(\''+qTopic+'\')">Reintentar 🔁</button><button class="btn-ghost" onclick="renderQuizMenu()">Otros temas 🇨🇱</button></div></div>'}
