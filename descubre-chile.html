<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Descubre Chile 🇨🇱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       DESCUBRE CHILE — Explore Chile's History, Geography & Culture
       ================================================================ */

    :root {
      --bg-deep: #0A0F1C;
      --bg-surface: #111827;
      --bg-card: #1A2234;
      --border-subtle: rgba(255,255,255,0.07);

      --chile-red: #D93636;
      --chile-red-glow: rgba(217, 54, 54, 0.35);
      --chile-blue: #0039A6;
      --chile-blue-glow: rgba(0, 57, 166, 0.35);
      --andes-gold: #E8A838;
      --andes-gold-glow: rgba(232, 168, 56, 0.4);
      --patagonia-teal: #2CB5A0;
      --patagonia-glow: rgba(44, 181, 160, 0.35);
      --atacama-orange: #E87040;
      --atacama-glow: rgba(232, 112, 64, 0.35);
      --snow-white: #F0F4FF;
      --green: #34D399;
      --green-glow: rgba(52,211,153,0.4);
      --red: #F87171;
      --red-glow: rgba(248,113,113,0.35);

      --text: #F0EDFF;
      --text-muted: #8B95B0;

      --font-display: 'Baloo 2', 'Nunito', cursive;
      --font-body: 'Nunito', system-ui, sans-serif;
      --radius: 20px;
      --radius-sm: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; font-size: 16px; }

    body {
      min-height: 100%;
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- Mountain silhouette background ---- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1.5px 1.5px at 12% 18%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.4), transparent),
        radial-gradient(2px 2px at 55% 12%, rgba(232,168,56,0.6), transparent),
        radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 85% 25%, rgba(217,54,54,0.5), transparent),
        radial-gradient(1px 1px at 15% 75%, rgba(44,181,160,0.4), transparent),
        radial-gradient(1.5px 1.5px at 45% 65%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.3), transparent);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 7s ease-in-out infinite alternate;
    }
    @keyframes twinkle { 0% { opacity: 0.5; } 100% { opacity: 1; } }

    /* Decorative mountain gradient at bottom */
    body::after {
      content: '';
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 200px;
      background: linear-gradient(to top, rgba(10,15,28,0.95), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ---- Atmosphere blobs ---- */
    .atmo { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; animation: drift 22s ease-in-out infinite alternate; }
    .atmo-1 { width: 400px; height: 400px; background: rgba(217,54,54,0.08); top: -80px; right: -60px; }
    .atmo-2 { width: 350px; height: 350px; background: rgba(0,57,166,0.08); bottom: 10%; left: -70px; animation-delay: -6s; }
    .atmo-3 { width: 300px; height: 300px; background: rgba(44,181,160,0.06); top: 40%; left: 40%; animation-delay: -12s; }
    @keyframes drift {
      0% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px,-15px) scale(1.06); }
      100% { transform: translate(-10px,10px) scale(0.97); }
    }

    /* ---- App shell ---- */
    .app {
      position: relative; z-index: 1; width: 100%; max-width: 640px;
      padding: 24px 20px 40px; min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ---- Home button ---- */
    .home-btn {
      position: absolute; top: 24px; left: 20px;
      width: 42px; height: 42px; border-radius: 12px;
      border: 1.5px solid var(--border-subtle); background: var(--bg-card);
      color: var(--text-muted); display: flex; align-items: center; justify-content: center;
      font-size: 20px; text-decoration: none; transition: all 0.25s ease; z-index: 10;
    }
    .home-btn:hover { border-color: var(--chile-red); color: var(--chile-red); transform: scale(1.08); }

    /* ---- User badge ---- */
    .user-badge {
      position: absolute; top: 24px; right: 20px;
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px 6px 8px;
      background: var(--bg-card); border: 1.5px solid var(--border-subtle);
      border-radius: 99px; z-index: 10;
      font-family: var(--font-display); font-size: 0.85rem; font-weight: 700; color: var(--text);
    }
    .user-badge-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 2px solid; }

    /* ---- Screen management ---- */
    .screen { display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    /* ================================================================
       TOPIC SELECT SCREEN
       ================================================================ */
    .topic-header {
      text-align: center; margin: 40px 0 28px; animation: fadeUp 0.6s ease-out both;
    }
    .topic-header .flag { font-size: 56px; display: block; margin-bottom: 4px; animation: flagWave 3s ease-in-out infinite; }
    @keyframes flagWave {
      0%,100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    .topic-header h1 {
      font-family: var(--font-display); font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 800;
      background: linear-gradient(135deg, var(--chile-red), var(--snow-white), var(--chile-blue));
      background-size: 200% 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: gradShift 5s ease-in-out infinite;
    }
    @keyframes gradShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .topic-header p { color: var(--text-muted); font-weight: 600; margin-top: 6px; font-size: 1rem; }
    .topic-header .greeting { color: var(--andes-gold); font-weight: 700; font-size: 0.9rem; }

    .topics-grid {
      width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .topic-card {
      background: var(--bg-card); border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius); padding: 22px 18px; text-align: center;
      cursor: pointer; transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      animation: fadeUp 0.5s ease-out both; position: relative; overflow: hidden;
    }
    .topic-card:nth-child(1) { animation-delay: 0.1s; }
    .topic-card:nth-child(2) { animation-delay: 0.15s; }
    .topic-card:nth-child(3) { animation-delay: 0.2s; }
    .topic-card:nth-child(4) { animation-delay: 0.25s; }
    .topic-card:nth-child(5) { animation-delay: 0.3s; }
    .topic-card:nth-child(6) { animation-delay: 0.35s; }

    .topic-card:hover {
      transform: translateY(-5px) scale(1.03);
      border-color: var(--topic-color); box-shadow: 0 12px 40px -10px var(--topic-glow);
    }
    .topic-card .topic-icon { font-size: 40px; display: block; margin-bottom: 8px; transition: transform 0.3s ease; }
    .topic-card:hover .topic-icon { transform: scale(1.15) rotate(-5deg); }
    .topic-card .topic-name { font-family: var(--font-display); font-size: 1.05rem; font-weight: 700; color: var(--topic-color); }
    .topic-card .topic-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    .topic-card .topic-progress { display: inline-block; margin-top: 8px; font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
    .topic-progress.done { background: rgba(52,211,153,0.12); color: var(--green); }
    .topic-progress.pending { background: rgba(255,255,255,0.04); color: var(--text-muted); }

    /* Age-based suggestion badge */
    .topic-rec {
      display: inline-block; margin-top: 4px; padding: 2px 8px; border-radius: 99px;
      font-size: 0.65rem; font-weight: 700;
      background: rgba(44,181,160,0.1); color: var(--patagonia-teal);
    }

    /* Per-topic colors */
    .t-geography { --topic-color: var(--patagonia-teal); --topic-glow: var(--patagonia-glow); }
    .t-indigenous { --topic-color: var(--andes-gold); --topic-glow: var(--andes-gold-glow); }
    .t-history { --topic-color: var(--chile-red); --topic-glow: var(--chile-red-glow); }
    .t-culture { --topic-color: var(--atacama-orange); --topic-glow: var(--atacama-glow); }
    .t-nature { --topic-color: #34D399; --topic-glow: rgba(52,211,153,0.35); }
    .t-famous { --topic-color: #A78BFA; --topic-glow: rgba(167,139,250,0.35); }

    /* ================================================================
       STORY SCREEN — Learn about the topic
       ================================================================ */
    .story-header {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 20px; animation: fadeUp 0.4s ease-out;
    }
    .story-back {
      width: 38px; height: 38px; border-radius: 10px; border: 1.5px solid var(--border-subtle);
      background: var(--bg-card); color: var(--text-muted); display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }
    .story-back:hover { border-color: var(--chile-red); color: var(--chile-red); }
    .story-title { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; }
    .story-icon { font-size: 28px; }

    .story-cards {
      display: flex; flex-direction: column; gap: 16px;
      margin-bottom: 24px; animation: fadeUp 0.5s ease-out 0.1s both;
    }
    .story-card {
      background: var(--bg-card); border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius); padding: 24px; line-height: 1.7;
    }
    .story-card h3 {
      font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
      margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    .story-card p { color: var(--text-muted); font-size: 0.92rem; font-weight: 600; }
    .story-card .fun-fact {
      margin-top: 12px; padding: 10px 14px; border-radius: var(--radius-sm);
      background: rgba(232,168,56,0.08); border-left: 3px solid var(--andes-gold);
      font-size: 0.85rem; color: var(--andes-gold);
    }

    .start-quiz-btn {
      width: 100%; padding: 18px; border-radius: var(--radius-sm); border: none;
      background: linear-gradient(135deg, var(--chile-red), var(--atacama-orange));
      color: #fff; font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
      cursor: pointer; transition: all 0.25s ease;
      box-shadow: 0 4px 20px var(--chile-red-glow);
      animation: fadeUp 0.5s ease-out 0.2s both;
    }
    .start-quiz-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--chile-red-glow); }

    /* ================================================================
       QUIZ SCREEN
       ================================================================ */
    .quiz-top {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      margin: 24px 0 16px; padding: 0 4px;
    }
    .quiz-badge {
      font-family: var(--font-display); font-size: 0.9rem; font-weight: 700;
      padding: 6px 14px; border-radius: 99px;
      background: rgba(217,54,54,0.12); color: var(--chile-red);
    }
    .quiz-score { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--andes-gold); }

    .quiz-progress-wrap {
      width: 100%; height: 10px; background: var(--bg-card); border-radius: 99px;
      overflow: hidden; margin-bottom: 28px; border: 1px solid var(--border-subtle);
    }
    .quiz-progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--chile-red), var(--atacama-orange));
      transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 0 12px var(--chile-red-glow);
    }

    .quiz-card {
      width: 100%; background: var(--bg-card); border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius); padding: 32px 24px; text-align: center;
      margin-bottom: 24px; min-height: 140px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .quiz-card.correct { border-color: var(--green); box-shadow: 0 0 30px var(--green-glow); }
    .quiz-card.wrong { border-color: var(--red); box-shadow: 0 0 30px var(--red-glow); animation: shake 0.4s ease; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }

    .quiz-q-label { font-family: var(--font-display); font-size: 0.82rem; font-weight: 700; color: var(--chile-red); text-transform: uppercase; letter-spacing: 0.06em; }
    .quiz-q-text { font-family: var(--font-display); font-size: clamp(1.2rem, 4vw, 1.6rem); font-weight: 800; line-height: 1.4; }

    .quiz-options { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .quiz-opt-btn {
      width: 100%; padding: 16px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-subtle); background: var(--bg-card);
      color: var(--text); font-family: var(--font-body); font-size: 1rem;
      font-weight: 700; cursor: pointer; text-align: left;
      transition: all 0.25s ease;
    }
    .quiz-opt-btn:hover { border-color: var(--chile-red); background: rgba(217,54,54,0.06); }
    .quiz-opt-btn.disabled { pointer-events: none; }
    .quiz-opt-btn.sel-correct { background: var(--green); border-color: var(--green); color: #fff; }
    .quiz-opt-btn.sel-wrong { background: var(--red); border-color: var(--red); color: #fff; }
    .quiz-opt-btn.reveal { border-color: var(--green); color: var(--green); }

    /* ================================================================
       RESULTS SCREEN
       ================================================================ */
    .results-wrap {
      text-align: center; display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 60px 0 40px; animation: fadeUp 0.6s ease-out;
    }
    .results-emoji { font-size: 72px; animation: flagWave 3s ease-in-out infinite; }
    .results-title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; }
    .results-sub { font-size: 1rem; color: var(--text-muted); font-weight: 600; max-width: 350px; }
    .results-stars { display: flex; gap: 8px; }
    .results-stars .star { font-size: 36px; }

    .results-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .action-btn {
      padding: 14px 24px; border-radius: var(--radius-sm); border: none;
      font-family: var(--font-display); font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.25s ease;
    }
    .btn-primary { background: linear-gradient(135deg, var(--chile-red), var(--atacama-orange)); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--chile-red-glow); }
    .btn-secondary { background: var(--bg-card); color: var(--text-muted); border: 1.5px solid var(--border-subtle); }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

    /* Feedback */
    .feedback {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-size: 80px; pointer-events: none; z-index: 100;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; opacity: 0;
    }
    .feedback.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

    /* ---- Mobile ---- */
    @media (max-width: 480px) {
      .app { padding: 16px 14px 32px; }
      .topics-grid { gap: 12px; }
      .topic-card { padding: 18px 14px; }
      .story-card { padding: 20px; }
    }

    /* Scrollbar styling */
    .app::-webkit-scrollbar { width: 6px; }
    .app::-webkit-scrollbar-track { background: transparent; }
    .app::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>

  <div class="atmo atmo-1"></div>
  <div class="atmo atmo-2"></div>
  <div class="atmo atmo-3"></div>

  <div class="app">
    <a class="home-btn" href="index.html" title="Back to apps">🏠</a>
    <div class="user-badge" id="userBadge" style="display:none">
      <div class="user-badge-avatar" id="ubAvatar"></div>
      <span id="ubName"></span>
    </div>

    <!-- ============ TOPIC SELECT ============ -->
    <div class="screen active" id="screen-topics">
      <div class="topic-header">
        <span class="flag">🇨🇱</span>
        <h1>Descubre Chile</h1>
        <p>Learn about an amazing country!</p>
        <div class="greeting" id="greeting"></div>
      </div>
      <div class="topics-grid" id="topics-grid"></div>
    </div>

    <!-- ============ STORY ============ -->
    <div class="screen" id="screen-story">
      <div class="story-header">
        <button class="story-back" onclick="goTopics()">←</button>
        <span class="story-icon" id="storyIcon"></span>
        <div class="story-title" id="storyTitle"></div>
      </div>
      <div class="story-cards" id="storyCards"></div>
      <button class="start-quiz-btn" onclick="startQuiz()">Take the Quiz! 🧠</button>
    </div>

    <!-- ============ QUIZ ============ -->
    <div class="screen" id="screen-quiz">
      <div class="quiz-top">
        <div class="quiz-badge" id="quizBadge"></div>
        <div class="quiz-score" id="quizScore">⭐ 0</div>
      </div>
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-fill" id="quizProgress" style="width:0%"></div>
      </div>
      <div class="quiz-card" id="quizCard">
        <div class="quiz-q-label" id="quizLabel"></div>
        <div class="quiz-q-text" id="quizText"></div>
      </div>
      <div class="quiz-options" id="quizOptions"></div>
    </div>

    <!-- ============ RESULTS ============ -->
    <div class="screen" id="screen-results">
      <div class="results-wrap">
        <span class="results-emoji" id="rEmoji"></span>
        <div class="results-title" id="rTitle"></div>
        <div class="results-sub" id="rSub"></div>
        <div class="results-stars" id="rStars"></div>
        <div class="results-actions">
          <button class="action-btn btn-primary" onclick="retryQuiz()">Try Again 🔁</button>
          <button class="action-btn btn-secondary" onclick="goTopics()">More Topics 🇨🇱</button>
        </div>
      </div>
    </div>
  </div>

  <div class="feedback" id="feedback">
    <span class="feedback-emoji" id="feedbackEmoji"></span>
  </div>

  <script>
    /* ================================================================
       DESCUBRE CHILE — Data & Engine
       ================================================================ */

    /* ---- Shared user system ---- */
    function getActiveUser() { try { return JSON.parse(localStorage.getItem('zs_active_user')); } catch { return null; } }
    function getUserKey() { const u = getActiveUser(); return u ? `zs_chile_${u.name.toLowerCase().replace(/\s+/g,'_')}` : null; }
    function getUserProgress() { const k = getUserKey(); if (!k) return {}; try { return JSON.parse(localStorage.getItem(k)) || {}; } catch { return {}; } }
    function saveTopicProgress(topicId, stars, pct) {
      const k = getUserKey(); if (!k) return;
      const prog = getUserProgress();
      const prev = prog[topicId] || { bestStars: 0, bestPct: 0 };
      prog[topicId] = { bestStars: Math.max(prev.bestStars, stars), bestPct: Math.max(prev.bestPct, pct), lastPlayed: new Date().toISOString() };
      localStorage.setItem(k, JSON.stringify(prog));
    }

    /* ---- Topic Data ---- */
    const TOPICS = [
      {
        id: 'geography', icon: '🏔️', name: 'Geography', sub: 'From the driest desert to icy glaciers',
        cssClass: 't-geography',
        stories: [
          { title: '🌎 Chile\'s Shape', text: 'Chile is one of the longest, narrowest countries in the world — stretching over 4,300 km from north to south but averaging only 177 km wide. Imagine a ribbon along the Pacific coast of South America!', fact: 'If you placed Chile on a map of Europe, it would reach from Norway to the Sahara Desert!' },
          { title: '🏜️ The Atacama Desert', text: 'The northern part of Chile is home to the Atacama Desert, one of the driest places on Earth. Some weather stations there have never recorded rain! Despite being so dry, it\'s full of stunning salt flats, geysers, and even flamingos at high-altitude lakes.', fact: 'NASA tests Mars rovers in the Atacama because its soil is so similar to the surface of Mars!' },
          { title: '🗻 The Andes Mountains', text: 'The mighty Andes run along Chile\'s entire eastern border. Some peaks reach over 6,000 meters high. These mountains are home to condors, volcanoes, and world-class ski resorts.', fact: 'Chile has over 2,000 volcanoes, and about 90 of them are active!' },
          { title: '🧊 Patagonia & Glaciers', text: 'In the far south, Chile transforms into a land of glaciers, fjords, and windswept plains called Patagonia. Torres del Paine National Park is one of the most beautiful places on Earth, with its towering granite peaks and turquoise lakes.', fact: 'The Grey Glacier in Torres del Paine is over 6 km wide and thousands of years old.' },
        ],
        quiz: [
          { q: 'How long is Chile from north to south?', a: 'Over 4,300 km', opts: ['Over 4,300 km', 'About 1,000 km', 'Around 2,500 km', 'Less than 500 km'] },
          { q: 'What desert in Chile is one of the driest on Earth?', a: 'Atacama', opts: ['Atacama', 'Sahara', 'Gobi', 'Kalahari'] },
          { q: 'What mountains run along Chile\'s eastern border?', a: 'The Andes', opts: ['The Andes', 'The Rockies', 'The Alps', 'The Himalayas'] },

    /* ---- State ---- */
    let currentTopic = null;
    let quizQs = [];
    let quizIdx = 0;
    let quizScore = 0;

    /* ---- Screen nav ---- */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
      window.scrollTo(0, 0);
    }

    /* ---- Init ---- */
    function init() {
      const user = getActiveUser();
      if (user) {
        const badge = document.getElementById('userBadge');
        badge.style.display = '';
        document.getElementById('ubAvatar').textContent = user.avatar;
        document.getElementById('ubAvatar').style.cssText = `background:${user.color}22;border-color:${user.color}`;
        document.getElementById('ubName').textContent = user.name;
        // Age-aware greeting
        if (user.age && user.age <= 6) {
          document.getElementById('greeting').textContent = `¡Vamos, ${user.name}! Start with the pictures and fun facts!`;
        } else if (user.age && user.age >= 10) {
          document.getElementById('greeting').textContent = `¡Vamos, ${user.name}! Challenge yourself with every quiz!`;
        } else {
          document.getElementById('greeting').textContent = `¡Vamos, ${user.name}!`;
        }
      }
      renderTopics();
    }

    function renderTopics() {
      const grid = document.getElementById('topics-grid');
      const prog = getUserProgress();
      const user = getActiveUser();
      const age = user ? user.age : null;

      // Age-based topic recommendations
      const recMap = {
        geography: { minAge: 4,  note: 'Great first topic!' },
        nature:    { minAge: 4,  note: 'Kids love animals!' },
        culture:   { minAge: 5,  note: 'Yummy food stories!' },
        indigenous:{ minAge: 7,  note: 'Amazing cultures!' },
        history:   { minAge: 8,  note: 'Historical adventures!' },
        famous:    { minAge: 8,  note: 'Inspiring people!' },
      };

      grid.innerHTML = '';
      TOPICS.forEach((t, i) => {
        const data = prog[t.id];
        const done = data && data.bestStars > 0;
        const rec = recMap[t.id];
        const isRec = age && rec && age >= rec.minAge;
        const card = document.createElement('div');
        card.className = `topic-card ${t.cssClass}`;
        card.style.animationDelay = `${0.1 + i * 0.05}s`;
        card.onclick = () => openTopic(t.id);
        card.innerHTML = `
          <span class="topic-icon">${t.icon}</span>
          <div class="topic-name">${t.name}</div>
          <div class="topic-sub">${t.sub}</div>
          <span class="topic-progress ${done ? 'done' : 'pending'}">${done ? '⭐'.repeat(data.bestStars) + ' ' + data.bestPct + '%' : 'Not started'}</span>
          ${isRec && !done ? `<span class="topic-rec">👈 ${rec.note}</span>` : ''}
        `;
        grid.appendChild(card);
      });
    }

    function openTopic(id) {
      currentTopic = TOPICS.find(t => t.id === id);
      if (!currentTopic) return;
      document.getElementById('storyIcon').textContent = currentTopic.icon;
      document.getElementById('storyTitle').textContent = currentTopic.name;
      const cards = document.getElementById('storyCards');
      cards.innerHTML = '';
      currentTopic.stories.forEach(s => {
        const card = document.createElement('div');
        card.className = 'story-card';
        card.innerHTML = `<h3>${s.title}</h3><p>${s.text}</p>${s.fact ? `<div class="fun-fact">💡 <strong>Fun fact:</strong> ${s.fact}</div>` : ''}`;
        cards.appendChild(card);
      });
      showScreen('story');
    }

    function goTopics() { renderTopics(); showScreen('topics'); }

    /* ---- Quiz ---- */
    function startQuiz() {
      if (!currentTopic) return;
      const user = getActiveUser();
      const age = user ? user.age : null;

      // Age-based quiz adjustment: younger kids get fewer questions
      let qs = [...currentTopic.quiz];
      if (age && age <= 6) {
        // Shuffle and take only 3 for young kids
        qs = qs.sort(() => Math.random() - 0.5).slice(0, 3);
      }
      quizQs = qs;
      quizIdx = 0; quizScore = 0;
      document.getElementById('quizBadge').textContent = `${currentTopic.icon} ${currentTopic.name}`;
      updateQuizScore();
      showScreen('quiz');
      showQuizQ();
    }

    function updateQuizScore() { document.getElementById('quizScore').textContent = `⭐ ${quizScore}`; }

    function showQuizQ() {
      const q = quizQs[quizIdx];
      const card = document.getElementById('quizCard');
      card.className = 'quiz-card';
      document.getElementById('quizLabel').textContent = `Question ${quizIdx + 1} of ${quizQs.length}`;
      document.getElementById('quizText').textContent = q.q;
      document.getElementById('quizProgress').style.width = `${(quizIdx / quizQs.length) * 100}%`;

      const wrap = document.getElementById('quizOptions');
      wrap.innerHTML = '';
      const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
      shuffled.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'quiz-opt-btn';
        btn.textContent = opt;
        btn.onclick = () => handleQuizAnswer(btn, opt, q);
        wrap.appendChild(btn);
      });
    }

    function handleQuizAnswer(btn, selected, q) {
      const correct = selected === q.a;
      const card = document.getElementById('quizCard');
      const allBtns = document.querySelectorAll('.quiz-opt-btn');
      allBtns.forEach(b => {
        b.classList.add('disabled');
        if (b.textContent === q.a) b.classList.add('reveal');
      });
      if (correct) {
        quizScore++; updateQuizScore();
        btn.classList.add('sel-correct');
        card.classList.add('correct');
        showFeedback(['🎉','🇨🇱','✨','💫','🏔️','👏'][Math.floor(Math.random() * 6)]);
      } else {
        btn.classList.add('sel-wrong');
        card.classList.add('wrong');
        showFeedback(['😬','🤔','💪','🔄'][Math.floor(Math.random() * 4)]);
      }
      setTimeout(() => { quizIdx++; quizIdx >= quizQs.length ? finishQuiz() : showQuizQ(); }, 1300);
    }

    function showFeedback(emoji) {
      const el = document.getElementById('feedback');
      document.getElementById('feedbackEmoji').textContent = emoji;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 900);
    }

    function finishQuiz() {
      const pct = Math.round((quizScore / quizQs.length) * 100);
      const stars = pct >= 90 ? 3 : pct >= 60 ? 2 : 1;
      document.getElementById('quizProgress').style.width = '100%';

      saveTopicProgress(currentTopic.id, stars, pct);

      let emoji, title, sub;
      if (pct >= 90) { emoji = '🏆'; title = '¡Excelente!'; sub = `${quizScore} out of ${quizQs.length} correct — you're a Chile expert!`; }
      else if (pct >= 60) { emoji = '🌟'; title = '¡Muy bien!'; sub = `${quizScore} out of ${quizQs.length} — great knowledge!`; }
      else { emoji = '💪'; title = '¡Sigue intentando!'; sub = `${quizScore} out of ${quizQs.length} — read the stories again and try!`; }

      document.getElementById('rEmoji').textContent = emoji;
      document.getElementById('rTitle').textContent = title;
      document.getElementById('rSub').textContent = sub;

      const starsEl = document.getElementById('rStars');
      starsEl.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const span = document.createElement('span');
        span.className = 'star';
        span.textContent = i < stars ? '⭐' : '☆';
        starsEl.appendChild(span);
      }

      showScreen('results');
    }

    function retryQuiz() { startQuiz(); }

    init();
  </script>
